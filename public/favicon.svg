<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="orangeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#F97316" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background, rounded square like iOS app icon -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- Top edge orange accent line -->
  <rect x="100" y="0" width="312" height="4" rx="2" fill="#F97316" opacity="0.5"/>

  <!-- Phone handset - bold, centered, orange with glow -->
  <g filter="url(#orangeGlow)">
    <path d="
      M 186 90
      C 164 90 146 108 146 130
      L 146 170
      C 146 188 158 204 176 208
      C 190 212 200 224 200 238
      L 200 272
      C 200 286 204 300 214 310
      L 262 358
      C 272 368 286 374 302 374
      L 334 374
      C 356 374 374 356 374 334
      L 374 294
      C 374 272 356 256 334 252
      C 320 250 310 238 310 224
      L 310 190
      C 310 176 304 162 294 152
      L 248 106
      C 238 96 224 90 210 90
      Z
    " fill="#F97316"/>
  </g>

  <!-- Missed call X badge - bottom left -->
  <circle cx="166" cy="362" r="36" fill="#0d0d0d" stroke="#F97316" stroke-width="5"/>
  <line x1="151" y1="347" x2="181" y2="377" stroke="#F97316" stroke-width="7" stroke-linecap="round"/>
  <line x1="181" y1="347" x2="151" y2="377" stroke="#F97316" stroke-width="7" stroke-linecap="round"/>

  <!-- Signal arcs top right -->
  <g opacity="1">
    <path d="M 348 148 A 22 22 0 0 1 370 170" fill="none" stroke="#F97316" stroke-width="9" stroke-linecap="round"/>
    <path d="M 336 136 A 42 42 0 0 1 390 190" fill="none" stroke="#F97316" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <path d="M 324 124 A 62 62 0 0 1 410 210" fill="none" stroke="#F97316" stroke-width="4" stroke-linecap="round" opacity="0.28"/>
  </g>
</svg>
