<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phoneShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#F97316" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <!-- Phone handset - matching the Gemini image shape exactly -->
  <!-- Classic curved receiver, large and centered-left -->
  <g filter="url(#phoneShadow)">
    <path d="
      M 108 150
      C 108 124 130 102 156 102
      L 194 102
      C 208 102 220 112 222 126
      L 234 196
      C 236 210 228 224 214 228
      L 194 234
      C 186 236 182 244 186 252
      C 210 302 250 340 300 364
      C 308 368 316 364 318 356
      L 324 336
      C 328 322 342 314 356 316
      L 426 328
      C 440 330 450 342 450 356
      L 450 394
      C 450 420 428 442 402 442
      L 388 442
      C 232 442 108 318 108 162
      Z
    " fill="#F97316"/>
  </g>

  <!-- AI network nodes - top right, white/glowing -->
  <g filter="url(#nodeGlow)">
    <!-- Connecting lines first (behind nodes) -->
    <line x1="318" y1="168" x2="368" y2="140" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="318" y1="168" x2="372" y2="200" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="318" y1="168" x2="268" y2="148" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

    <!-- Centre node (largest) -->
    <circle cx="318" cy="168" r="18" fill="white" opacity="0.95"/>
    <!-- Top right node -->
    <circle cx="372" cy="132" r="11" fill="white" opacity="0.85"/>
    <!-- Right node -->
    <circle cx="382" cy="204" r="9" fill="white" opacity="0.75"/>
    <!-- Left node -->
    <circle cx="260" cy="144" r="9" fill="white" opacity="0.75"/>
  </g>
</svg>
